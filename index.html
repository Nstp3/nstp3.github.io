<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Razl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/components.css" />
  <link rel="stylesheet" href="src/styles/layout.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <img id="logoImg" src="" class="logo-img" alt="logo">
        <span class="logo-text">Razl — Plan fast</span>
      </div>
      <nav class="tab-nav" id="tabNav">
        <button class="tab-btn tab-btn--active" data-tab="home">🏠 <span data-i18n="tab_home">Главная</span></button>
        <button class="tab-btn" data-tab="tasks">📓 <span data-i18n="tab_tasks">Задачи</span></button>
        <button class="tab-btn" data-tab="relax">🎬 <span data-i18n="tab_relax">Досуг</span></button>
      </nav>
      <div class="topbar-right">
        <div class="theme-switcher" id="themeSwitcher">
          <button class="btn-theme" id="btnTheme" title="Сменить тему">
            <img id="themeIconImg" src="" style="width:22px;height:22px;object-fit:contain;display:block;" alt="">
          </button>
          <div class="theme-dropdown" id="themeDropdown">
            <button class="theme-option" data-theme="dark">
              <img class="theme-opt-img" data-key="ic-theme-dark" src="" style="width:26px;height:26px;object-fit:contain;" alt="">
              <span>Стандартная</span>
            </button>
            <button class="theme-option" data-theme="ac">
              <img class="theme-opt-img" data-key="ic-theme-ac" src="" style="width:26px;height:26px;object-fit:contain;" alt="">
              <span>Assassin</span>
            </button>
            <button class="theme-option" data-theme="mythic">
              <img class="theme-opt-img" data-key="ic-theme-mythic" src="" style="width:26px;height:26px;object-fit:contain;" alt="">
              <span>SoloLeveling</span>
            </button>
          </div>
        </div>
        <button class="btn-ghost" id="btnLang">EN</button>
        <button class="btn-ghost" id="btnExport">Экспорт</button>
        <button class="btn-ghost" id="btnImport">Импорт</button>
      </div>
    </div>
  </header>

  <main id="app" class="container"></main>
  <div id="toast" class="toast hidden"></div>

  <!-- Нижняя навигация — только на мобиле -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="bnav-btn bnav-btn--active" data-tab="hero">
      <span class="bnav-icon">👤</span>
      <span class="bnav-label">Герой</span>
    </button>
    <button class="bnav-btn" data-tab="tasks">
      <span class="bnav-icon">✅</span>
      <span class="bnav-label">Задачи</span>
    </button>
    <button class="bnav-btn" data-tab="skills">
      <span class="bnav-icon">⚔️</span>
      <span class="bnav-label">Навыки</span>
    </button>
    <button class="bnav-btn" data-tab="habits">
      <span class="bnav-icon">🔥</span>
      <span class="bnav-label">Привычки</span>
    </button>
    <button class="bnav-btn" data-tab="leisure">
      <span class="bnav-icon">🎬</span>
      <span class="bnav-label">Досуг</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
